name: Build Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_OWNER: lixin89419
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: huzige

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: blog
            context: ThriveX-Blog
            file: ThriveX-Blog/Dockerfile
            image: huzige-thrivex-blog
          - name: admin
            context: ThriveX-Admin
            file: ThriveX-Admin/dockerfile
            image: huzige-thrivex-admin
          - name: server
            context: .
            file: ThriveX-Server/Dockerfile.runtime
            image: huzige-thrivex-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/${{ matrix.image }}:latest
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}:latest
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
