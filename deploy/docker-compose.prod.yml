services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ThriveX}
      MYSQL_USER: ${MYSQL_USER:-thrive}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  server:
    image: ghcr.io/lixin89419/huzige-thrivex-server:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 9003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-ThriveX}
      DB_USERNAME: ${DB_USERNAME:-thrive}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EMAIL_HOST: ${EMAIL_HOST:-mail.qq.com}
      EMAIL_PORT: ${EMAIL_PORT:-465}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      TZ: Asia/Shanghai
    volumes:
      - upload_data:/server/static/upload

  admin:
    image: ghcr.io/lixin89419/huzige-thrivex-admin:latest
    restart: unless-stopped
    depends_on:
      - server

  blog:
    image: ghcr.io/lixin89419/huzige-thrivex-blog:latest
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_PROJECT_API: http://server:9003/api
      NEXT_PUBLIC_CACHING_TIME: 1

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - blog
      - admin
      - server
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
  redis_data:
  upload_data:

